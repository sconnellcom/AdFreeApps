<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Quizard - Free flashcard study app with no ads. Create decks, flip cards, and track your progress.">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="../manifest.json">
    <link rel="apple-touch-icon" href="../icons/icon-152x152.png">
    <title>Quizard - Flashcards</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <!-- Standardized Header -->
        <div class="header-row">
            <div class="header-left">
                <span class="app-icon">🧙</span>
                <h1>Quizard</h1>
            </div>
            <div class="header-right">
                <button id="menuBtn" class="menu-btn" title="Menu">
                    <span class="hamburger-icon">
                        <span></span>
                        <span></span>
                        <span></span>
                    </span>
                </button>
            </div>
        </div>

        <!-- Menu Dropdown -->
        <div id="menuDropdown" class="menu-dropdown" style="display: none;">
            <a href="../" class="menu-item">
                <span class="menu-icon">💎</span>
                <span class="menu-label">Apps</span>
            </a>
            <button id="themeMenuItem" class="menu-item menu-item-button">
                <span class="menu-icon" id="themeMenuIcon">💜</span>
                <span class="menu-label">Change Theme</span>
            </button>
            <div id="themeSubmenu" class="theme-submenu" style="display: none;">
                <button class="theme-btn theme-default" data-theme="default" title="Purple Theme"></button>
                <button class="theme-btn theme-black" data-theme="black" title="Black Theme"></button>
                <button class="theme-btn theme-blue" data-theme="blue" title="Blue Theme"></button>
                <button class="theme-btn theme-blue-dark" data-theme="blue-dark" title="Dark Blue Theme"></button>
                <button class="theme-btn theme-light" data-theme="light" title="Olive Theme"></button>
                <button class="theme-btn theme-dark" data-theme="dark" title="Dark Olive Theme"></button>
                <button class="theme-btn theme-warm-light" data-theme="warm-light" title="Warm Light Theme"></button>
                <button class="theme-btn theme-warm-dark" data-theme="warm-dark" title="Warm Dark Theme"></button>
                <button class="theme-btn theme-red" data-theme="red" title="Red Theme"></button>
                <button class="theme-btn theme-red-dark" data-theme="red-dark" title="Dark Red Theme"></button>
                <button class="theme-btn theme-pink" data-theme="pink" title="Pink Theme"></button>
                <button class="theme-btn theme-pink-dark" data-theme="pink-dark" title="Dark Pink Theme"></button>
            </div>
            <a href="about/" class="menu-item">
                <span class="menu-icon">ⓘ</span>
                <span class="menu-label">About This App</span>
            </a>
        </div>

        <!-- ===== SCREEN: STUDY LOG ===== -->
        <div id="screen-study-log" class="screen">
            <div class="editor-header">
                <button class="btn-icon" onclick="renderDeckList()" title="Back" aria-label="Back to deck list">◀</button>
                <h2>Study Log</h2>
                <button class="btn btn-secondary" onclick="clearStudyLog()" style="font-size:0.8em; padding:5px 10px;">Clear</button>
            </div>
            <div id="studyLogList"></div>
        </div>

        <!-- ===== SCREEN: DECK LIST ===== -->
        <div id="screen-deck-list" class="screen active">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                <span class="screen-title">My Decks</span>
                <div style="display: flex; gap: 8px; align-items: center;">
                    <button class="btn-icon" onclick="renderStudyLog()" title="Study log" aria-label="View study log" style="font-size:1.2em;">📊</button>
                    <button class="btn btn-secondary" onclick="triggerImport()" title="Import a deck from a file" aria-label="Import a deck from a file">📂 Import</button>
                    <input type="file" id="importFileInput" accept=".json" style="display:none" onchange="handleImportFile(this)">
                    <button class="btn btn-primary" onclick="openEditor(null)">＋ New Deck</button>
                </div>
            </div>
            <div id="deckList"></div>
        </div>

        <!-- ===== SCREEN: DECK EDITOR ===== -->
        <div id="screen-deck-editor" class="screen">
            <div class="editor-header">
                <button class="btn-icon" onclick="renderDeckList()" title="Back">◀</button>
                <h2 id="editorTitle">New Deck</h2>
                <button class="btn-icon" id="exportDeckBtn" onclick="exportDeck(editorDeckId)" title="Export deck as file" aria-label="Export deck as file" style="display:none">⬇️</button>
                <button class="btn-icon" id="shareDeckBtn" onclick="shareDeckLink(editorDeckId)" title="Copy share link" aria-label="Copy share link" style="display:none">🔗</button>
            </div>

            <div class="form-group">
                <label for="deckTitleInput">Deck Title</label>
                <input id="deckTitleInput" class="form-input" type="text" placeholder="e.g. Spanish Vocabulary">
            </div>
            <div id="editorMsg" aria-live="polite" style="font-size:0.85em; color:var(--danger-color); min-height:1.2em; margin-bottom:4px;"></div>

            <div class="cards-section-header">
                <span class="cards-section-label">Cards</span>
                <button class="btn btn-secondary" onclick="addCardEditor()" style="font-size:0.85em; padding: 6px 12px;">＋ Add Card</button>
            </div>

            <div id="cardEditorList" class="card-editor-list"></div>

            <div class="editor-actions">
                <button class="btn btn-primary" style="flex:1" onclick="saveDeck()">💾 Save Deck</button>
                <button class="btn btn-secondary" onclick="renderDeckList()">Cancel</button>
            </div>
        </div>

        <!-- ===== SCREEN: STUDY ===== -->
        <div id="screen-study" class="screen">
            <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 10px;">
                <button class="btn-icon" onclick="renderDeckList()" title="Exit study">◀</button>
                <span style="font-size:0.9em; font-weight:600; color:var(--text-secondary); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" id="studyDeckName"></span>
                <label class="shuffle-toggle" for="shuffleToggle">
                    <input type="checkbox" id="shuffleToggle"> Shuffle
                </label>
            </div>

            <div class="study-progress">
                <span class="progress-text" id="studyProgressText">0 learned · 0 remaining</span>
            </div>
            <div class="progress-bar-wrap">
                <div class="progress-bar-fill" id="studyProgressFill" style="width:0%"></div>
            </div>

            <!-- Flashcard -->
            <div class="flashcard-wrap">
                <div class="flashcard" id="flashcard">
                    <div class="card-face card-face-front">
                        <div class="card-side-label">Term</div>
                        <img class="card-image" id="cardFrontImage" src="" alt="Front card image" style="display:none">
                        <div class="card-text" id="cardFrontText"></div>
                        <div class="card-tap-hint" id="cardTapHint">Tap card to reveal answer</div>
                    </div>
                    <div class="card-face card-face-back">
                        <div class="card-side-label">Definition</div>
                        <img class="card-image" id="cardBackImage" src="" alt="Back card image" style="display:none">
                        <div class="card-text" id="cardBackText"></div>
                    </div>
                </div>
            </div>

            <!-- Rating buttons (shown after flip) -->
            <div id="studyRatingRow" class="study-rating-row" style="display:none;">
                <button class="btn btn-learning" onclick="rateCard(false)">Still Learning</button>
                <button class="btn btn-know" onclick="rateCard(true)">Know ✓</button>
            </div>

            <!-- Nav row -->
            <div class="study-nav-row">
                <button class="btn btn-secondary" id="prevCardBtn" onclick="prevCard()">← Prev</button>
                <button class="btn btn-secondary" onclick="flipCard()">Flip Card</button>
                <button class="btn btn-secondary" id="nextCardBtn" onclick="nextCard()">Next →</button>
            </div>
        </div>

        <!-- ===== SCREEN: RESULTS ===== -->
        <div id="screen-results" class="screen">
            <div class="results-content">
                <div class="results-trophy" id="resultsTrophy">🎉</div>
                <div class="results-title">Session Complete!</div>
                <div class="results-subtitle" id="resultsDeckName"></div>

                <div class="results-stats">
                    <div class="stat-box">
                        <div class="stat-value" id="resultsKnown">0</div>
                        <div class="stat-label">Known</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value" id="resultsPercent">0%</div>
                        <div class="stat-label">Mastery</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value" id="resultsSeen">0</div>
                        <div class="stat-label">Reviews</div>
                    </div>
                </div>

                <div style="font-size:0.85em; color:var(--text-tertiary); margin-bottom:20px;">
                    <span id="resultsTotal">0</span> cards total · <span id="resultsTime">0s</span>
                </div>

                <div class="results-actions">
                    <button class="btn btn-primary" style="width:100%" onclick="restartStudy()">🔄 Study Again</button>
                    <button class="btn btn-secondary" style="width:100%" onclick="renderDeckList()">Back to Decks</button>
                </div>
            </div>
        </div>

    </div><!-- .container -->

    <!-- Import / Share modal -->
    <div id="shareImportModal" class="share-modal-overlay" style="display:none;">
        <div class="share-modal">
            <div class="share-modal-title">Import Deck?</div>
            <div class="share-modal-body" id="shareImportBody"></div>
            <div class="share-modal-actions">
                <button class="btn btn-primary" onclick="confirmShareImport()">Import</button>
                <button class="btn btn-secondary" onclick="cancelShareImport()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Toast notification -->
    <div id="toast" class="toast"></div>

    <script src="quizard.js"></script>
</body>

</html>
